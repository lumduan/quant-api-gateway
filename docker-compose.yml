services:
  api-gateway:
    build: .
    container_name: quant-api-gateway
    restart: always
    ports:
      # Host-side port is overridable via API_GATEWAY_HOST_PORT in .env
      # (defaults to 8000). Override when another service on the host
      # already binds 8000 — e.g. set API_GATEWAY_HOST_PORT=8080 when
      # the upstream quant-csm-set Strategy Service is co-located.
      - "${API_GATEWAY_HOST_PORT:-8000}:8000"
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: quant-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:

networks:
  default:
    name: quant-network
    external: true
